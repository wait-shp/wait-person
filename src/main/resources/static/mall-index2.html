<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <title>商城首页</title>
  <style>
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      margin: 0;
      padding: 0;
      background: #f7f7f8;
      color: #222;
    }

    .wrap {
      max-width: 760px;
      margin: 0 auto;
      padding: 40px 20px;
      text-align: center;
    }

    .card {
      background: #fff;
      border-radius: 12px;
      padding: 28px 20px;
      box-shadow: 0 8px 22px rgba(0, 0, 0, 0.06);
    }

    h1 {
      font-size: 28px;
      margin: 0 0 10px;
    }

    p {
      margin: 0 0 24px;
      color: #666;
    }

    .btn {
      display: inline-block;
      padding: 10px 18px;
      background: #2563eb;
      color: #fff;
      border: 0;
      border-radius: 8px;
      font-weight: 600;
      cursor: pointer;
    }

    .btn:hover {
      filter: brightness(0.95);
    }

    #orderBox {
      display: none;
      margin-top: 18px;
      background: #fff;
      border-radius: 12px;
      overflow: hidden;
      box-shadow: 0 8px 22px rgba(0, 0, 0, 0.06);
    }

    #orderFrame {
      border: 0;
      width: 100%;
      height: 720px;
    }
  </style>
</head>
<body>
  <div class="wrap">
    <div class="card" id="homeCard">
      <h1>欢迎光临</h1>
      <p>点击下方按钮进入下单页面</p>
      <button class="btn" type="button" onclick="goToOrder()">下单</button>
    </div>

    <div class="card" id="orderCard" style="display: none;">
      <button class="btn" type="button" onclick="goHome()" style="margin-bottom: 15px;">返回首页</button>
      <iframe id="orderFrame" src=""></iframe>
    </div>
  </div>

  <script>
    function goToOrder() {
      // 使用 history.pushState 添加历史记录，同时显示订单卡片
      history.pushState({ page: 'order' }, '', '/mall/order');
      document.getElementById('homeCard').style.display = 'none';
      document.getElementById('orderCard').style.display = 'block';
      document.getElementById('orderFrame').src = '/order.html';
    }

    function goHome() {
      // 使用 history.pushState 添加历史记录，同时显示首页卡片
      history.pushState({ page: 'home' }, '', '/mall');
      document.getElementById('orderCard').style.display = 'none';
      document.getElementById('homeCard').style.display = 'block';
      document.getElementById('orderFrame').src = '';
    }

    // 监听浏览器返回按钮
    window.onpopstate = function(event) {
      if (event.state && event.state.page === 'home') {
        document.getElementById('orderCard').style.display = 'none';
        document.getElementById('homeCard').style.display = 'block';
        document.getElementById('orderFrame').src = '';
      } else if (event.state && event.state.page === 'order') {
        document.getElementById('homeCard').style.display = 'none';
        document.getElementById('orderCard').style.display = 'block';
      }
    };
  </script>
</body>
</html>
