<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <title>商城首页</title>
  <style>
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      margin: 0;
      padding: 0;
      background: #f7f7f8;
      color: #222;
    }

    .wrap {
      max-width: 760px;
      margin: 0 auto;
      padding: 40px 20px;
      text-align: center;
    }

    .card {
      background: #fff;
      border-radius: 12px;
      padding: 28px 20px;
      box-shadow: 0 8px 22px rgba(0, 0, 0, 0.06);
    }

    h1 {
      font-size: 28px;
      margin: 0 0 10px;
    }

    p {
      margin: 0 0 24px;
      color: #666;
    }

    .btn {
      display: inline-block;
      padding: 10px 18px;
      background: #2563eb;
      color: #fff;
      border: 0;
      border-radius: 8px;
      font-weight: 600;
      cursor: pointer;
    }

    .btn:hover {
      filter: brightness(0.95);
    }

    #orderBox {
      display: none;
      margin-top: 18px;
      background: #fff;
      border-radius: 12px;
      overflow: hidden;
      box-shadow: 0 8px 22px rgba(0, 0, 0, 0.06);
    }

    #orderFrame {
      border: 0;
      width: 100%;
      height: 720px;
    }
  </style>
</head>
<body>
  <div class="wrap">
    <div class="card">
      <h1>欢迎光临</h1>
      <p>点击下方按钮进入下单页面（地址栏不会跳走）</p>
      <button class="btn" type="button" onclick="openOrder()">下单</button>
    </div>

    <div id="orderBox">
      <iframe id="orderFrame" src=""></iframe>
    </div>
  </div>

  <script>
    function openOrder() {
      const box = document.getElementById("orderBox");
      const frame = document.getElementById("orderFrame");
      box.style.display = "block";
      frame.src = "/mall/order";
    }
  </script>
</body>
</html>
